name: CI

on:
  push:
    branches: [main]
  pull_request:

# Gescheiden checks vóór release (SEC-8): lint, typecheck, unit tests,
# dependency-audit en een build. E2E draait apart (heeft een server nodig).
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
